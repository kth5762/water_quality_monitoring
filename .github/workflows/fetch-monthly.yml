name: Fetch Monthly Water Quality

on:
  schedule:
    - cron: '0 0 5 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch 상수도법정수질정보
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: node scripts/fetch-monthly.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/monthly.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore(monthly): $(TZ=Asia/Seoul date +'%Y-%m')"
            git push
          fi
